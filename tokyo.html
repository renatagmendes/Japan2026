<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
:root{
  --ink:#0D0B08;
  --ink2:#2A2520;
  --gold:#C9A84C;
  --gold-light:#F0D890;
  --gold-soft:rgba(201,168,76,0.12);
  --cream:#F5F0E8;
  --cream2:#EDE7D9;
  --border:rgba(201,168,76,0.25);
  --rest:#C0392B;
  --bar:#6C3483;
  --cafe:#935116;
  --shop:#1A5276;
  --act:#1E8449;
  --card-bg:rgba(13,11,8,0.92);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}

/* HEADER */
.header{background:var(--ink);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-shrink:0;height:56px}
.header-left{display:flex;align-items:center;gap:10px}
.cat-icon{font-size:20px;line-height:1}
.header-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--gold);letter-spacing:0.02em}
.header-title em{font-style:italic;color:var(--gold-light)}
.nav-link{font-size:12px;color:rgba(245,240,232,0.5);text-decoration:none;border:0.5px solid var(--border);padding:4px 12px;border-radius:20px;transition:all 0.15s}
.nav-link:hover{color:var(--gold);border-color:var(--gold)}

/* TABS */
.tabs-bar{background:var(--ink2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs-bar::-webkit-scrollbar{height:2px}
.tabs-bar::-webkit-scrollbar-track{background:transparent}
.tabs-bar::-webkit-scrollbar-thumb{background:var(--border)}
.tab{font-size:12px;padding:10px 14px;border:none;background:transparent;color:rgba(245,240,232,0.45);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.tab:hover{color:var(--cream)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* MAIN LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:340px;flex-shrink:0;overflow-y:auto;background:var(--ink);border-right:1px solid var(--border)}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border)}
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}

/* FILTERS */
.filters{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:rgba(245,240,232,0.55);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.filter-btn:hover{border-color:var(--gold);color:var(--cream)}
.filter-btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.filter-btn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* BAIRRO INFO */
.bairro-info{padding:14px 16px;border-bottom:1px solid var(--border)}
.bairro-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--gold);margin-bottom:4px}
.bairro-desc{font-size:12px;color:rgba(245,240,232,0.55);line-height:1.6;margin-bottom:8px}
.bairro-tip{font-size:11px;color:rgba(201,168,76,0.7);padding:6px 10px;background:var(--gold-soft);border-radius:6px;border-left:2px solid var(--gold);line-height:1.5}

/* PLACE LIST */
.places-list{padding:8px}
.place-card{padding:10px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer;border:0.5px solid transparent;transition:all 0.15s;position:relative}
.place-card:hover{background:rgba(201,168,76,0.06);border-color:var(--border)}
.place-card.highlighted{background:var(--gold-soft);border-color:var(--gold)}
.place-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px}
.place-name{font-size:13px;font-weight:500;color:var(--cream);line-height:1.3}
.star{color:var(--gold);font-size:12px;margin-left:3px;flex-shrink:0}
.cat-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.badge-rest{background:rgba(192,57,43,0.18);color:#E8927A}
.badge-bar{background:rgba(108,52,131,0.2);color:#C39BD3}
.badge-cafe{background:rgba(147,81,22,0.2);color:#E59866}
.badge-shop{background:rgba(26,82,118,0.2);color:#85C1E9}
.badge-act{background:rgba(30,132,73,0.2);color:#82E0AA}
.place-who{font-size:10px;color:rgba(245,240,232,0.35);margin-bottom:3px}
.place-note{font-size:11px;color:rgba(245,240,232,0.45);line-height:1.5}
.place-links{display:flex;gap:6px;margin-top:6px}
.place-link{font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid var(--border);color:rgba(201,168,76,0.7);text-decoration:none;transition:all 0.15s}
.place-link:hover{border-color:var(--gold);color:var(--gold)}
.place-link.gmaps{background:var(--gold-soft)}

/* SECTION DIVIDER */
.section-div{padding:6px 12px 4px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(201,168,76,0.5);margin-top:4px}

/* MAP POPUP */
.leaflet-popup-content-wrapper{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;color:var(--cream);box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.leaflet-popup-tip{background:var(--card-bg)}
.leaflet-popup-content{margin:10px 14px;font-family:'DM Sans',sans-serif}
.popup-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);margin-bottom:3px}
.popup-cat{font-size:11px;color:rgba(245,240,232,0.5);margin-bottom:5px}
.popup-note{font-size:12px;color:rgba(245,240,232,0.75);line-height:1.5;margin-bottom:8px}
.popup-link{display:inline-block;font-size:11px;padding:4px 10px;border-radius:6px;background:var(--gold-soft);border:0.5px solid var(--gold);color:var(--gold);text-decoration:none}
.popup-link:hover{background:var(--gold);color:var(--ink)}
.leaflet-control-zoom a{background:var(--ink2)!important;border-color:var(--border)!important;color:var(--cream)!important}

/* LEGEND */
.map-legend{position:absolute;bottom:16px;right:16px;z-index:1000;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:11px}
.legend-title{color:var(--gold);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.legend-row{display:flex;align-items:center;gap:6px;color:rgba(245,240,232,0.6);margin-bottom:3px}
.legend-row:last-child{margin-bottom:0}

@media(max-width:700px){
  .sidebar{width:100%;height:45vh;overflow-y:auto}
  .main{flex-direction:column}
  .map-wrap{height:55vh}
  .map-legend{display:none}
}
</style>
</head>

const CAT_COLORS = {rest:'#E8927A',bar:'#C39BD3',cafe:'#E59866',shop:'#85C1E9',act:'#82E0AA'};
const CAT_LABELS = {rest:'Restaurante',bar:'Bar',cafe:'Café',shop:'Shopping',act:'Atividade'};
const CAT_ICONS = {rest:'🍽',bar:'🍸',cafe:'☕',shop:'🛍',act:'⛩'};

function gmapsUrl(name, lat, lng) {
  return `https://www.google.com/maps/search/${encodeURIComponent(name)}/@${lat},${lng},17z`;
}

function makeIcon(cat, isShortlist) {
  const color = CAT_COLORS[cat] || '#aaa';
  const star = isShortlist ? '★' : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <ellipse cx="14" cy="33" rx="5" ry="2.5" fill="rgba(0,0,0,0.3)"/>
    <path d="M14 2 C7 2 2 7 2 13 C2 22 14 34 14 34 C14 34 26 22 26 13 C26 7 21 2 14 2Z" fill="${color}" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
    ${isShortlist ? `<text x="14" y="10" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">★</text>` : ''}
    <text x="14" y="${isShortlist ? '20' : '17'}" text-anchor="middle" font-size="11">${CAT_ICONS[cat]||'📍'}</text>
  </svg>`;
  return L.divIcon({html:svg, className:'', iconSize:[28,36], iconAnchor:[14,34], popupAnchor:[0,-32]});
}

let map, markers = [], currentBairro = 'ginza', currentCat = 'all', currentHighlight = null;

function initMap() {
  map = L.map('map', {zoomControl:true}).setView([35.6717,139.7664], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CARTO', maxZoom:19
  }).addTo(map);
  map.zoomControl.setPosition('topright');
}

function renderMap(bairroId, cat) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const filtered = PLACES.filter(p => p.b === bairroId && (cat === 'all' || p.cat === cat));
  filtered.forEach(p => {
    const inShortlist = SHORTLIST.has(p.name);
    const icon = makeIcon(p.cat, inShortlist);
    const m = L.marker([p.lat, p.lng], {icon}).addTo(map);
    const popup = `<div class="popup-name">${p.name}${inShortlist?' ★':''}</div>
      <div class="popup-cat">${CAT_LABELS[p.cat]||p.cat} · Score ${p.score} · ${p.who}</div>
      <div class="popup-note">${p.note}</div>
      <a class="popup-link" href="${gmapsUrl(p.name,p.lat,p.lng)}" target="_blank">Abrir no Google Maps →</a>`;
    m.bindPopup(popup, {maxWidth:240});
    m.on('click', () => highlightCard(p.name));
    markers.push(m);
  });
}

function highlightCard(name) {
  document.querySelectorAll('.place-card').forEach(c => c.classList.toggle('highlighted', c.dataset.name === name));
  const card = document.querySelector(`.place-card[data-name="${name}"]`);
  if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderSidebar(bairroId, cat) {
  const b = BAIRROS.find(x => x.id === bairroId);
  document.getElementById('bairro-info').innerHTML = `
    <div class="bairro-name">${b.name}</div>
    <div class="bairro-desc">${b.desc}</div>
    <div class="bairro-tip">${b.tip}</div>`;

  const filtered = PLACES.filter(p => p.b === bairroId && (cat === 'all' || p.cat === cat));
  const shortlisted = filtered.filter(p => SHORTLIST.has(p.name)).sort((a,b) => b.score - a.score);
  const others = filtered.filter(p => !SHORTLIST.has(p.name)).sort((a,b) => b.score - a.score);

  let html = '';
  if (shortlisted.length) {
    html += `<div class="section-div">★ Shortlist</div>`;
    shortlisted.forEach(p => html += placeCard(p, true));
  }
  if (others.length) {
    html += `<div class="section-div">Todos os lugares</div>`;
    others.forEach(p => html += placeCard(p, false));
  }
  document.getElementById('places-list').innerHTML = html;
}

function placeCard(p, inShortlist) {
  const catClass = 'badge-' + p.cat;
  const star = inShortlist ? ' <span class="star">★</span>' : '';
  return `<div class="place-card" data-name="${p.name}" onclick="focusPlace('${p.name.replace(/'/g,"\\'")}',${p.lat},${p.lng})">
    <div class="place-card-top">
      <div class="place-name">${p.name}${star}</div>
      <span class="cat-badge ${catClass}">${CAT_LABELS[p.cat]||p.cat}</span>
    </div>
    <div class="place-who">${p.who} · Score ${p.score}</div>
    <div class="place-note">${p.note}</div>
    <div class="place-links">
      <a class="place-link gmaps" href="${gmapsUrl(p.name,p.lat,p.lng)}" target="_blank" onclick="event.stopPropagation()">Google Maps →</a>
    </div>
  </div>`;
}

function focusPlace(name, lat, lng) {
  map.setView([lat, lng], 17);
  markers.forEach(m => {
    const ll = m.getLatLng();
    if (Math.abs(ll.lat - lat) < 0.0002 && Math.abs(ll.lng - lng) < 0.0002) {
      m.openPopup();
    }
  });
  highlightCard(name);
}

function switchBairro(id) {
  currentBairro = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  const b = BAIRROS.find(x => x.id === id);
  map.setView(b.center, b.zoom);
  renderMap(id, currentCat);
  renderSidebar(id, currentCat);
}

function switchCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderMap(currentBairro, cat);
  renderSidebar(currentBairro, cat);
}

// BUILD TABS
const tabsBar = document.getElementById('tabs-bar');
BAIRROS.forEach((b,i) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i===0?' active':'');
  btn.dataset.id = b.id;
  btn.textContent = b.name.split('·')[0].trim();
  btn.onclick = () => switchBairro(b.id);
  tabsBar.appendChild(btn);
});

// FILTER BUTTONS
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => switchCat(btn.dataset.cat);
});

// INIT
initMap();
renderMap('ginza', 'all');
renderSidebar('ginza', 'all');
</script>
